<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <meta name="description"
    content="A premium immersive Pomodoro timer with soundscapes, dynamic backgrounds, and a beautiful glassmorphism UI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Animated Background Layers -->
  <div id="bg-layer" aria-hidden="true">
    <div class="bg-gradient"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="bg-noise"></div>
  </div>

  <!-- Main App -->
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div id="logo">
        <svg id="logo-icon" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="url(#lg1)" stroke-width="1.5" />
          <path d="M14 8v6l4 2" stroke="url(#lg1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <defs>
            <linearGradient id="lg1" x1="2" y1="2" x2="26" y2="26" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a78bfa" />
              <stop offset="100%" stop-color="#67e8f9" />
            </linearGradient>
          </defs>
        </svg>
        <span id="logo-text">POMOFocus</span>
      </div>
      <div id="session-dots" aria-label="Session progress">
        <span class="dot active" data-dot="0"></span>
        <span class="dot" data-dot="1"></span>
        <span class="dot" data-dot="2"></span>
        <span class="dot" data-dot="3"></span>
      </div>
      <div id="header-right">
        <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
            <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5" />
            <path
              d="M10 3v1.5M10 15.5V17M3 10h1.5M15.5 10H17M4.93 4.93l1.06 1.06M14.01 14.01l1.06 1.06M4.93 15.07l1.06-1.06M14.01 5.99l1.06-1.06"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Grid Layout -->
    <div id="main-layout">
      
      <!-- Left Column: Controls & Timer -->
      <div id="left-col">
        <!-- Mode Tabs -->
        <nav id="mode-tabs" role="tablist" aria-label="Timer mode">
      <button class="tab active" id="tab-focus" role="tab" aria-selected="true" data-mode="focus">Focus</button>
      <button class="tab" id="tab-short" role="tab" aria-selected="false" data-mode="short">Short Break</button>
      <button class="tab" id="tab-long" role="tab" aria-selected="false" data-mode="long">Long Break</button>
      <div id="tab-slider"></div>
    </nav>

    <!-- Timer Card (Glassmorphism) -->
    <main id="timer-card" role="main">
      <div id="card-inner">

        <!-- Circular Progress Ring -->
        <div id="ring-container" aria-hidden="true">
          <svg id="ring-svg" viewBox="0 0 240 240">
            <!-- Track ring -->
            <circle class="ring-track" cx="120" cy="120" r="108" />
            <!-- Progress ring -->
            <circle class="ring-progress" id="ring-progress" cx="120" cy="120" r="108" />
            <!-- Glow effect -->
            <circle class="ring-glow" id="ring-glow" cx="120" cy="120" r="108" />
          </svg>

          <!-- Timer Display -->
          <div id="timer-display">
            <span id="timer-minutes" aria-live="polite">25</span>
            <span id="timer-colon">:</span>
            <span id="timer-seconds">00</span>
          </div>

          <!-- Mode Label -->
          <div id="mode-label">Focus Session</div>
        </div>

        <!-- Control Bar -->
        <div id="control-bar">
          <button id="reset-btn" class="ctrl-btn secondary" aria-label="Reset timer" title="Reset (R)">
            <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
              <path d="M4.5 10a5.5 5.5 0 1 0 1-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M4.5 6v4h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>

          <button id="play-btn" class="ctrl-btn primary" aria-label="Start timer" title="Start/Pause (Space)">
            <!-- Play icon -->
            <svg id="icon-play" viewBox="0 0 20 20" fill="none" width="26" height="26">
              <path d="M7 4.5l9 5.5-9 5.5V4.5z" fill="currentColor" />
            </svg>
            <!-- Pause icon -->
            <svg id="icon-pause" viewBox="0 0 20 20" fill="none" width="26" height="26" class="hidden">
              <rect x="5" y="4" width="3.5" height="12" rx="1.5" fill="currentColor" />
              <rect x="11.5" y="4" width="3.5" height="12" rx="1.5" fill="currentColor" />
            </svg>
          </button>

          <button id="skip-btn" class="ctrl-btn secondary" aria-label="Skip to next session" title="Skip (S)">
            <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
              <path d="M5 4.5l8 5.5-8 5.5V4.5z" fill="currentColor" opacity="0.6" />
              <path d="M14 5v10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <!-- Session Count -->
        <div id="session-info">
          <span id="session-count-label">Session <span id="session-num">1</span> of 4</span>
          <span id="sessions-completed-label" class="hidden">🎉 Cycle Complete!</span>
        </div>

      </div>

      <!-- Right Column: Sidebar Panels -->
      <div id="right-col">
        <!-- Task List Panel -->
        <section id="task-panel" aria-label="Tasks">
      <div id="task-header">
        <h3 id="task-title">Current Tasks</h3>
      </div>
      <form id="task-form">
        <input type="text" id="task-input" placeholder="What are you working on?" autocomplete="off" />
        <button type="submit" id="task-add-btn" aria-label="Add task">+</button>
      </form>
      <ul id="task-list">
        <!-- populated by JS -->
      </ul>
    </section>

    <!-- Soundscape Panel -->
    <section id="soundscape-panel" aria-label="Ambient soundscapes">
      <p id="soundscape-title">
        <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
          <path d="M2 5h3l4-3v12l-4-3H2V5z" fill="currentColor" opacity="0.7" />
          <path d="M11 6a3 3 0 0 1 0 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <path d="M13 4a6 6 0 0 1 0 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
        </svg>
        Soundscapes
      </p>
      <div id="soundscape-btns">
        <button class="sound-btn" id="snd-rain" data-sound="rain" aria-pressed="false">
          <span class="sound-emoji">🌧️</span>
          <span class="sound-name">Lo-fi Rain</span>
        </button>
        <button class="sound-btn" id="snd-white" data-sound="white" aria-pressed="false">
          <span class="sound-emoji">🌊</span>
          <span class="sound-name">White Noise</span>
        </button>
        <button class="sound-btn" id="snd-forest" data-sound="forest" aria-pressed="false">
          <span class="sound-emoji">🌿</span>
          <span class="sound-name">Forest Birds</span>
        </button>
      </div>
        <p id="soundscape-hint">Plays during Focus sessions only</p>
      </section>
      </div> <!-- end right-col -->

    </div> <!-- end main-layout -->

  </div>

  <!-- Completion Notification Overlay -->
  <div id="notif-overlay" class="hidden" aria-live="assertive" role="alert">
    <div id="notif-card">
      <div id="notif-icon">✨</div>
      <h2 id="notif-title">Focus Complete!</h2>
      <p id="notif-sub">Time for a well-earned break.</p>
      <button id="notif-ok" class="ctrl-btn primary" style="width:140px">Start Break</button>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="timer.js"></script>
  <script src="app.js"></script>
</body>

</html>
